<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Interaktif - Habitat Makhluk Hidup</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f7f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            height: 6px;
            background-color: #e0e0e0;
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: #2ec4b6;
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-number {
            font-size: 0.9rem;
            color: #7f8c8d;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .question-text {
            font-size: 1.25rem;
            color: #2c3e50;
            margin-bottom: 20px;
            font-weight: 600;
            line-height: 1.5;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px 20px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #4a5568;
            font-weight: 500;
        }

        .option-btn:hover:not([disabled]) {
            background-color: #edf2f7;
            border-color: #cbd5e0;
        }

        .option-btn[disabled] {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background-color: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724 !important;
        }

        .option-btn.wrong {
            background-color: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24 !important;
        }

        .feedback-panel {
            margin-top: 20px;
            padding: 18px;
            border-radius: 8px;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .feedback-panel.correct-style {
            background-color: #e8f5e9;
            border-left: 5px solid #2e7d32;
        }

        .feedback-panel.wrong-style {
            background-color: #ffebee;
            border-left: 5px solid #c62828;
        }

        .feedback-title {
            font-weight: bold;
            font-size: 1.05rem;
            margin-bottom: 6px;
        }

        .feedback-title.correct-text { color: #2e7d32; }
        .feedback-title.wrong-text { color: #c62828; }

        .feedback-text {
            font-size: 0.95rem;
            color: #455a64;
            line-height: 1.45;
        }

        .action-container {
            margin-top: 25px;
            display: flex;
            justify-content: flex-end;
        }

        .next-btn {
            background-color: #2ec4b6;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: none;
            transition: background 0.2s;
        }

        .next-btn:hover {
            background-color: #23a99d;
        }

        .result-screen {
            text-align: center;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .result-title {
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .score-display {
            font-size: 4rem;
            font-weight: 800;
            color: #2ec4b6;
            margin-bottom: 15px;
        }

        .result-summary {
            font-size: 1.1rem;
            color: #616161;
            margin-bottom: 25px;
        }

        .restart-btn {
            background-color: #ff9f1c;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .restart-btn:hover {
            background-color: #f18f01;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="progress-bar-container" class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>

        <div id="quiz-screen">
            <div id="question-number" class="question-number"></div>
            <div id="question-text" class="question-text">Memuat pertanyaan...</div>
            
            <div id="options-container" class="options-container"></div>

            <div id="feedback-panel" class="feedback-panel">
                <div id="feedback-title" class="feedback-title"></div>
                <div id="feedback-text" class="feedback-text"></div>
            </div>

            <div class="action-container">
                <button id="next-btn" class="next-btn" onclick="nextQuestion()"></button>
            </div>
        </div>

        <div id="result-screen" class="result-screen">
            <div class="result-title">Kuis Selesai! 🎉</div>
            <div id="score-display" class="score-display">0</div>
            <div id="result-summary" class="result-summary"></div>
            <button class="restart-btn" onclick="restartQuiz()">Ulangi Kuis</button>
        </div>
    </div>

    <audio id="audio-correct" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-500.wav" preload="auto"></audio>
    <audio id="audio-wrong" src="https://assets.mixkit.co/active_storage/sfx/2873/2873-500.wav" preload="auto"></audio>

    <script>
        // Data soal yang sudah dipetakan secara otomatis
        const quizData = [
            {
                question: "Habitat adalah ....",
                options: [
                    { text: "A. Tempat bermain makhluk hidup", isCorrect: false },
                    { text: "B. Tempat tinggal makhluk hidup dan memperoleh kebutuhan hidupnya", isCorrect: true },
                    { text: "C. Tempat menyimpan makanan", isCorrect: false },
                    { text: "D. Tempat berkembang biak manusia", isCorrect: false }
                ],
                explanation: "Habitat adalah tempat hidup suatu makhluk hidup yang menyediakan makanan, air, udara, dan perlindungan yang dibutuhkan untuk bertahan hidup."
            },
            {
                question: "Hewan yang hidup di habitat gurun adalah ....",
                options: [
                    { text: "A. Beruang kutub", isCorrect: false },
                    { text: "B. Unta", isCorrect: true },
                    { text: "C. Paus", isCorrect: false },
                    { text: "D. Katak", isCorrect: false }
                ],
                explanation: "Unta hidup di gurun karena memiliki kemampuan beradaptasi dengan lingkungan yang panas dan kering."
            },
            {
                question: "Ikan dapat hidup dengan baik di sungai karena ....",
                options: [
                    { text: "A. Memiliki sayap untuk terbang", isCorrect: false },
                    { text: "B. Memiliki kaki yang kuat", isCorrect: false },
                    { text: "C. Memiliki insang untuk bernapas di air", isCorrect: true },
                    { text: "D. Memiliki bulu yang tebal", isCorrect: false }
                ],
                explanation: "Ikan menggunakan insang untuk mengambil oksigen yang terdapat di dalam air sehingga dapat hidup di habitat perairan."
            },
            {
                question: "Tumbuhan bakau banyak ditemukan di ....",
                options: [
                    { text: "A. Pegunungan", isCorrect: false },
                    { text: "B. Hutan hujan tropis", isCorrect: false },
                    { text: "C. Daerah pantai", isCorrect: true },
                    { text: "D. Padang rumput", isCorrect: false }
                ],
                explanation: "Bakau tumbuh di daerah pantai dan muara sungai karena mampu hidup di lingkungan yang memiliki kadar garam tinggi."
            },
            {
                question: "Jika habitat hewan rusak akibat penebangan hutan, maka yang mungkin terjadi adalah ....",
                options: [
                    { text: "A. Hewan semakin mudah mendapatkan makanan", isCorrect: false },
                    { text: "B. Jumlah hewan bertambah banyak", isCorrect: false },
                    { text: "C. Hewan kehilangan tempat tinggal dan sumber makanan", isCorrect: true },
                    { text: "D. Hewan menjadi lebih kuat", isCorrect: false }
                ],
                explanation: "Kerusakan habitat menyebabkan hewan kehilangan tempat tinggal, perlindungan, dan sumber makanan sehingga kelangsungan hidupnya terancam."
            }
        ];

        let currentQuestionIndex = 0;
        let correctAnswersCount = 0;

        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const progressBarContainer = document.getElementById('progress-bar-container');
        const progressFill = document.getElementById('progress-fill');
        const questionNumberElem = document.getElementById('question-number');
        const questionTextElem = document.getElementById('question-text');
        const optionsContainerElem = document.getElementById('options-container');
        const feedbackPanel = document.getElementById('feedback-panel');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackText = document.getElementById('feedback-text');
        const nextBtn = document.getElementById('next-btn');
        
        const audioCorrect = document.getElementById('audio-correct');
        const audioWrong = document.getElementById('audio-wrong');

        function loadQuestion() {
            feedbackPanel.style.display = 'none';
            nextBtn.style.display = 'none';
            optionsContainerElem.innerHTML = '';

            const progressPercent = (currentQuestionIndex / quizData.length) * 100;
            progressFill.style.width = `${progressPercent}%`;

            const currentQuestion = quizData[currentQuestionIndex];
            questionNumberElem.innerText = `Soal ${currentQuestionIndex + 1} dari ${quizData.length}`;
            questionTextElem.innerText = currentQuestion.question;

            currentQuestion.options.forEach((option) => {
                const button = document.createElement('button');
                button.innerText = option.text;
                button.classList.add('option-btn');
                button.addEventListener('click', () => selectAnswer(button, option.isCorrect));
                optionsContainerElem.appendChild(button);
            });
        }

        function selectAnswer(selectedButton, isCorrect) {
            const currentQuestion = quizData[currentQuestionIndex];
            const allButtons = optionsContainerElem.querySelectorAll('.option-btn');

            allButtons.forEach(button => button.disabled = true);

            if (isCorrect) {
                selectedButton.classList.add('correct');
                feedbackTitle.innerText = "Benar! 🎉";
                feedbackTitle.className = "feedback-title correct-text";
                feedbackPanel.className = "feedback-panel correct-style";
                correctAnswersCount++;
                
                audioCorrect.currentTime = 0;
                audioCorrect.play().catch(e => console.log("Audio diblokir browser"));
            } else {
                selectedButton.classList.add('wrong');
                feedbackTitle.innerText = "Salah! ❌";
                feedbackTitle.className = "feedback-title wrong-text";
                feedbackPanel.className = "feedback-panel wrong-style";

                allButtons.forEach((button, index) => {
                    if (currentQuestion.options[index].isCorrect) {
                        button.classList.add('correct');
                    }
                });

                audioWrong.currentTime = 0;
                audioWrong.play().catch(e => console.log("Audio diblokir browser"));
            }

            feedbackText.innerText = currentQuestion.explanation;
            feedbackPanel.style.display = 'block';
            
            if (currentQuestionIndex === quizData.length - 1) {
                nextBtn.innerText = "Lihat Hasil Akhir";
            } else {
                nextBtn.innerText = "Soal Berikutnya";
            }
            nextBtn.style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            progressFill.style.width = '100%';
            quizScreen.style.display = 'none';
            progressBarContainer.style.display = 'none';
            resultScreen.style.display = 'block';

            // Skor dihitung secara dinamis sesuai rumus: (Benar / Total Soal) * 100
            const finalScore = Math.round((correctAnswersCount / quizData.length) * 100);
            document.getElementById('score-display').innerText = finalScore;
            
            // Output summary dinamis sesuai instruksi
            document.getElementById('result-summary').innerText = `Kamu berhasil menjawab ${correctAnswersCount} dari ${quizData.length} soal dengan benar.`;
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            correctAnswersCount = 0;
            quizScreen.style.display = 'block';
            progressBarContainer.style.display = 'block';
            resultScreen.style.display = 'none';
            loadQuestion();
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
